DEFAULT:
  exp_name: forecasting 
  seed: 42

DATASET:
  datadir: ../dataset/ETT-small
  dataname: ETTh1
  scaler: standard
  batch_size: 16
  shuffle: true
  num_workers: 0
  pin_memory: true
  drop_last: true
  seq_len: 96
  label_len: 48
  pred_len: 96
  split_rate: [8545, 2881, 2881]
  time_embedding: [0, 'd']
  del_feature: null

TRAIN:
  epoch: 10
  ckp_metric: loss
  eval_epochs: 1
  log_epochs: 1
  log_eval_iter: 100
  early_stopping_count: 5
  resume: null
  pre_training: false
  data_num: 0
  fine_tuning_method: full
  grad_accum_steps: 1
  mixed_precision: 'no'
  early_stopping_metric: 'loss'
  lradj: 'type1'
  return_output: false
  del_pt_file: True
  wandb: 
    use: true
    iter: 50
    exp_name: TimesNet_ETT
    project_name: TimesNet
    entity: cindy609-seoul-national-university
LOSS:
  loss_name: mse

OPTIMIZER:
  opt_name: adamw
  lr: 0.0001
  params:
    weight_decay: 0.0005

RESULT:
  savedir: './saved_model'